<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Questionnaire</title>
    <link rel="stylesheet" th:href="@{/css/add-questionnaire.css}">
</head>
<body>
<div class="container">
    <h1>Add New Questionnaire</h1>
    <!-- Error message if something goes wrong -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <!-- Form to create a question -->
    <form th:action="@{/quizlist/add}" th:object="${question}" method="post">
        <!-- Field for question text -->
        <div class="form-group">
            <label for="questionText">Question</label>
            <input type="text" id="questionText" th:field="*{questionText}" required>
            <span th:if="${#fields.hasErrors('questionText')}" th:errors="*{questionText}" class="error"></span>
        </div>
        <p class="options-title">Answer Options</p>
        <div class="options-grid">
            <!-- Field for option 1 -->
            <div class="form-group">
                <label for="option1">Option 1:</label>
                <input type="text" id="option1" th:field="*{options[0]}" required>
            </div>
            <!-- Field for option 2 -->
            <div class="form-group">
                <label for="option2">Option 2:</label>
                <input type="text" id="option2" th:field="*{options[1]}" required>
            </div>
            <!-- Field for option 3 -->
            <div class="form-group">
                <label for="option3">Option 3:</label>
                <input type="text" id="option3" th:field="*{options[2]}" required>
            </div>
            <!-- Field for option 4 -->
            <div class="form-group">
                <label for="option4">Option 4:</label>
                <input type="text" id="option4" th:field="*{options[3]}" required>
            </div>
        </div>
        <!-- Selector to indicate which is the correct answer -->
        <div class="form-group">
            <label for="correctAnswer">Correct Answer:</label>
            <select id="correctAnswer" th:field="*{correctAnswer}">
                <option value="">Select...</option>
            </select>
            <span th:if="${#fields.hasErrors('correctAnswer')}" th:errors="*{correctAnswer}" class="error"></span>
        </div>

        <div class="form-group" id="confirmGroup" style="display:none;">
            <label for="confirmAnswer">Confirm Correct Answer:</label>
            <select id="confirmAnswer">
                <option value="">Select again to confirm...</option>
            </select>
            <span id="confirmError" class="error" style="display:none;">Answers do not match.</span>
        </div>

        <!-- Action buttons -->
        <div class="button-group">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/quizlist}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    const inputs = ['option1','option2','option3','option4'].map(id => document.getElementById(id));
    const mainSelect = document.getElementById('correctAnswer');
    const confirmGroup = document.getElementById('confirmGroup');
    const confirmSelect = document.getElementById('confirmAnswer');
    const confirmError = document.getElementById('confirmError');

    function rebuildSelect(select, keepValue) {
        select.innerHTML = '<option value="">Select...</option>';
        inputs.forEach((inp, i) => {
            if (inp.value.trim()) {
                const opt = document.createElement('option');
                opt.value = inp.value.trim();
                opt.textContent = `Option ${i+1}: ${inp.value.trim()}`;
                if (opt.value === keepValue) opt.selected = true;
                select.appendChild(opt);
            }
        });
    }

    inputs.forEach(inp => inp.addEventListener('input', () => {
        rebuildSelect(mainSelect, mainSelect.value);
        rebuildSelect(confirmSelect, confirmSelect.value);
    }));

    mainSelect.addEventListener('change', () => {
        if (mainSelect.value) {
            rebuildSelect(confirmSelect, '');
            confirmGroup.style.display = 'block';
        } else {
            confirmGroup.style.display = 'none';
        }
        confirmError.style.display = 'none';
    });

    confirmSelect.addEventListener('change', () => {
        confirmError.style.display =
            confirmSelect.value && confirmSelect.value !== mainSelect.value ? 'block' : 'none';
    });

    document.querySelector('form').addEventListener('submit', e => {
        if (!mainSelect.value) {
            e.preventDefault();
            return;
        }
        if (mainSelect.value !== confirmSelect.value) {
            e.preventDefault();
            confirmError.textContent = confirmSelect.value
                ? 'Answers do not match.' : 'Please confirm the correct answer.';
            confirmError.style.display = 'block';
        }
    });
</script>

</body>
</html>
