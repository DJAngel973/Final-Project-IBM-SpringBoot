spring.application.name=questionnaire

# PostgreSQL datasource
# Values are injected via environment variables (docker-compose .env or Railway).
# No defaults for credentials to avoid storing secrets in the repository.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA: auto-creates tables from @Entity classes on startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
