<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inicial-scale=1.0">
    <title>Quiz Results</title>
</head>
<body>
    <div class="container">
        <h1>Quiz Results</h1>
        <div class="result-card">
            <h2>User: <span th:text="${username}"></span></h2>
            <div class="score-display">
                <p>Correct answer: <strong th:text="${correctAnswers}"></strong></p>
                <p>Total questions: <strong th:text="${totalQuestions}"></strong></p>
                <p>Score: <strong th:text="${score + '%'}"></strong></p>
            </div>
            <div th:if="${score >= 70}" class="alert alert-success">
                Congratulations! You passed the quiz.
            </div>
            <div th:if="${score < 70}" class="alert alert-warning">
                You need more practice. Try again!
            </div>
        </div>
        <div class="button-group">
            <a th:href="@{/quiz}" class="btn btn-primary">Retry Quiz</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-logout">Log out</button>
            </form>
        </div>
    </div>
</body>
</html>
